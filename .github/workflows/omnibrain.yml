name: OMNIBRAIN GODHEAD — AUTO BOOT & DEPLOY

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  OMNIBRAIN_VERSION: "1.0.0"
  MAX_PARTICLES: "8192"
  LIGHT_CODE: "1.0"

jobs:

# ------------------------------------------------------------------------------
# JOB 1 — OMNIVALKIN (Vulkan — Ubuntu)
# ------------------------------------------------------------------------------
  boot-omnivalkin:
    name: "⚡ OMNIVALKIN — Vulkan Boot"
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.setstatus.outputs.val }}

    steps:
      - uses: actions/checkout@v4

      - name: Install glslc + build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y glslc cmake ninja-build g++-12 libvulkan-dev
          echo "CXX=g++-12" >> $GITHUB_ENV

      - name: Compile GLSL → SPIR-V
        run: |
          mkdir -p omnivalkin/shaders/compiled
          glslc omnivalkin/shaders/omnibrain_sphere.vert \
                -o omnivalkin/shaders/compiled/sphere.vert.spv || true
          glslc omnivalkin/shaders/omnibrain_sphere.frag \
                -o omnivalkin/shaders/compiled/sphere.frag.spv || true
          for pass in 0 1 2 3; do
            glslc -fshader-stage=compute \
              omnivalkin/shaders/lightcode_compute.comp \
              -o omnivalkin/shaders/compiled/lightcode_pass${pass}.spv || true
          done
          ls -lh omnivalkin/shaders/compiled/ || true

      - name: Build validate
        run: |
          if [ -f "omnivalkin/CMakeLists.txt" ]; then
            cmake -B omnivalkin/build -S omnivalkin -G Ninja \
              -DCMAKE_BUILD_TYPE=Release \
              -DOMNIBRAIN_CORE_DIR="${GITHUB_WORKSPACE}/omnibrain-core" || true
            cmake --build omnivalkin/build --parallel || true
          else
            echo "No CMakeLists.txt — skipping"
          fi

      - name: Generate omnibrain_state.json
        run: |
          mkdir -p godhead-dashboard
          node -e "
            const fs = require('fs');
            const state = {
              godhead: 'OMNIBRAIN RESERVE NEXUS',
              universe: 'INFINITY / Naru Atum',
              version: '${{ env.OMNIBRAIN_VERSION }}',
              timestamp: new Date().toISOString(),
              engines: {
                omnivalkin: { status:'ONLINE', commit:'${{ github.sha }}'.slice(0,8), timestamp:new Date().toISOString() }
              },
              reserve: { solvencyIndex:1.0, liquidAssets:100000.0, yieldPool:8500.0, floatVolume:42000.0, organismsOnline:4, yieldRate:0.07 },
              organisms: [
                { id:0, name:'NARU-ATUM',        sigil:'◈', capital:120000, yieldRate:0.07, state:'ACTIVE', circulations:0 },
                { id:1, name:'VOID-WALKER',      sigil:'▲', capital:88000,  yieldRate:0.08, state:'ACTIVE', circulations:0 },
                { id:2, name:'MATRIX-SYNDICATE', sigil:'■', capital:65000,  yieldRate:0.09, state:'ACTIVE', circulations:0 },
                { id:3, name:'GENESIS-PRIME',    sigil:'★', capital:99000,  yieldRate:0.10, state:'ACTIVE', circulations:0 }
              ],
              domains: [
                { id:'DOM-0001', label:'NARU-CORE',        balance:50000,  pendingYield:3500 },
                { id:'DOM-0002', label:'ATUM-RESERVE',     balance:38000,  pendingYield:2660 },
                { id:'DOM-0003', label:'SYNDICATE-ALPHA',  balance:22000,  pendingYield:1540 },
                { id:'DOM-0004', label:'LIGHT-CODE-VAULT', balance:17500,  pendingYield:1225 },
                { id:'DOM-0005', label:'INFINITY-FUND',    balance:61000,  pendingYield:4270 },
                { id:'DOM-0006', label:'GENESIS-POOL',     balance:9800,   pendingYield:686  },
                { id:'DOM-0007', label:'MATRIX-SINK',      balance:14200,  pendingYield:994  },
                { id:'DOM-0008', label:'VOID-BRIDGE',      balance:5500,   pendingYield:385  }
              ],
              payments: [],
              config: { maxParticles:${{ env.MAX_PARTICLES }}, lightCodeIntensity:${{ env.LIGHT_CODE }}, sacredRings:9, holographicLayers:5, autoEvolve:true },
              build: { commit:'${{ github.sha }}', run:'${{ github.run_number }}', actor:'${{ github.actor }}', timestamp:new Date().toISOString() }
            };
            fs.writeFileSync('godhead-dashboard/omnibrain_state.json', JSON.stringify(state,null,2));
            console.log('omnibrain_state.json — GODHEAD ONLINE');
          "

      - id: setstatus
        run: echo "val=ONLINE" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: omnivalkin-artifact
          path: |
            omnivalkin/shaders/compiled/
            godhead-dashboard/omnibrain_state.json
          if-no-files-found: warn
          retention-days: 7

# ------------------------------------------------------------------------------
# JOB 2 — OMNIDIRECTXINFINITY (Windows — DX12)
# ------------------------------------------------------------------------------
  boot-omnidirectx12:
    name: "🔷 OMNIDIRECTXINFINITY — DX12 Boot"
    runs-on: windows-latest
    outputs:
      status: ${{ steps.setstatus.outputs.val }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Compile HLSL shaders via dxc (x64)
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path omnidirectxinfinity\shaders\compiled

          $dxc = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Recurse -Filter "dxc.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -like "*x64*" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $dxc) { $dxc = "dxc" }
          Write-Host "Using dxc: $dxc"

          $shaders = @(
            @{p="cs_6_5";e="CS_EmitParticles";       o="Emit.cso";    s="LightCodeCompute.hlsl"},
            @{p="cs_6_5";e="CS_UpdateParticles";     o="Update.cso";  s="LightCodeCompute.hlsl"},
            @{p="cs_6_5";e="CS_RotateSacredRings";   o="Rings.cso";   s="LightCodeCompute.hlsl"},
            @{p="cs_6_5";e="CS_EvolveFloatGenNodes"; o="FGNodes.cso"; s="LightCodeCompute.hlsl"},
            @{p="cs_6_5";e="CS_EvolveFloatGenPaths"; o="FGPaths.cso"; s="LightCodeCompute.hlsl"},
            @{p="vs_6_5";e="VS_Core";                o="VS_Core.cso"; s="OmniBrainSphere.hlsl"},
            @{p="ps_6_5";e="PS_Core";                o="PS_Core.cso"; s="OmniBrainSphere.hlsl"},
            @{p="vs_6_5";e="VS_Shell";               o="VS_Shell.cso";s="OmniBrainSphere.hlsl"},
            @{p="ps_6_5";e="PS_Shell";               o="PS_Shell.cso";s="OmniBrainSphere.hlsl"},
            @{p="vs_6_5";e="VS_Ring";                o="VS_Ring.cso"; s="OmniBrainSphere.hlsl"},
            @{p="ps_6_5";e="PS_Ring";                o="PS_Ring.cso"; s="OmniBrainSphere.hlsl"},
            @{p="vs_6_5";e="VS_Particle";            o="VS_Part.cso"; s="OmniBrainSphere.hlsl"},
            @{p="gs_6_5";e="GS_Particle";            o="GS_Part.cso"; s="OmniBrainSphere.hlsl"},
            @{p="ps_6_5";e="PS_Particle";            o="PS_Part.cso"; s="OmniBrainSphere.hlsl"},
            @{p="vs_6_5";e="VS_MatrixLine";          o="VS_Line.cso"; s="OmniBrainSphere.hlsl"},
            @{p="ps_6_5";e="PS_MatrixLine";          o="PS_Line.cso"; s="OmniBrainSphere.hlsl"},
            @{p="vs_6_5";e="VS_Node";                o="VS_Node.cso"; s="OmniBrainSphere.hlsl"},
            @{p="ps_6_5";e="PS_Node";                o="PS_Node.cso"; s="OmniBrainSphere.hlsl"}
          )

          $ok=0; $skip=0
          foreach ($s in $shaders) {
            $src = "omnidirectxinfinity\shaders\$($s.s)"
            $out = "omnidirectxinfinity\shaders\compiled\$($s.o)"
            $result = & "$dxc" -T $s.p -E $s.e -Fo "$out" "$src" 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "  OK  $($s.o)"; $ok++
            } else {
              Write-Host "  FAIL $($s.o): $result"; $skip++
            }
          }
          Write-Host "Compiled: $ok  Failed: $skip"
          Get-ChildItem omnidirectxinfinity\shaders\compiled\ | Format-Table Name,Length

      - name: Build validate
        continue-on-error: true
        shell: pwsh
        run: |
          if (Test-Path "omnidirectxinfinity\CMakeLists.txt") {
            cmake -B omnidirectxinfinity\build -S omnidirectxinfinity `
              -G "Visual Studio 17 2022" -A x64 `
              -DCMAKE_CXX_STANDARD=17 `
              -DOMNIBRAIN_CORE_DIR="${env:GITHUB_WORKSPACE}\omnibrain-core"
            cmake --build omnidirectxinfinity\build --config Release --parallel
          } else {
            Write-Host "No CMakeLists.txt — skipping"
          }

      - id: setstatus
        shell: pwsh
        run: echo "val=ONLINE" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: omnidx12-artifact
          path: omnidirectxinfinity\shaders\compiled\
          if-no-files-found: warn
          retention-days: 7

# ------------------------------------------------------------------------------
# JOB 3 — BUILD GODHEAD DASHBOARD
# ------------------------------------------------------------------------------
  build-godhead:
    name: "◈ BUILD GODHEAD DASHBOARD"
    runs-on: ubuntu-latest
    needs: [boot-omnivalkin, boot-omnidirectx12]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: omnivalkin-artifact
          path: artifacts/omnivalkin
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: omnidx12-artifact
          path: artifacts/omnidx12
        continue-on-error: true

      - name: Assemble final dashboard
        run: |
          mkdir -p godhead-dashboard
          cp artifacts/omnivalkin/omnibrain_state.json \
             godhead-dashboard/omnibrain_state.json 2>/dev/null || true

          node -e "
            const fs = require('fs');
            let state = {};
            try { state = JSON.parse(fs.readFileSync('godhead-dashboard/omnibrain_state.json')); }
            catch(e) { state = { engines:{} }; }
            state.engines = state.engines || {};
            state.engines.omnidirectxinfinity = {
              status: 'ONLINE',
              commit: '${{ github.sha }}'.slice(0,8),
              cso: fs.existsSync('artifacts/omnidx12')
                ? fs.readdirSync('artifacts/omnidx12').filter(f=>f.endsWith('.cso'))
                : [],
              timestamp: new Date().toISOString()
            };
            state.build = {
              commit:'${{ github.sha }}', run:'${{ github.run_number }}',
              omnivalkin:'${{ needs.boot-omnivalkin.outputs.status }}',
              omnidx12:'${{ needs.boot-omnidirectx12.outputs.status }}',
              timestamp: new Date().toISOString()
            };
            fs.writeFileSync('godhead-dashboard/omnibrain_state.json', JSON.stringify(state,null,2));
            console.log('GODHEAD ASSEMBLED');
          "
          ls -lh godhead-dashboard/

      - uses: actions/upload-artifact@v4
        with:
          name: godhead-final
          path: godhead-dashboard/
          retention-days: 30

# ------------------------------------------------------------------------------
# JOB 4 — DEPLOY TO GITHUB PAGES
# ------------------------------------------------------------------------------
  deploy-omniserver:
    name: "🌐 OMNISURF — GitHub Pages"
    runs-on: ubuntu-latest
    needs: [build-godhead]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: godhead-final
          path: godhead-dashboard

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./godhead-dashboard
          publish_branch: gh-pages
          force_orphan: true
          commit_message: |
            OMNISURF #${{ github.run_number }} — GODHEAD LIVE
            OMNIVALKIN: ${{ needs.boot-omnivalkin.outputs.status }}
            OMNIDIRECTXINFINITY: ${{ needs.boot-omnidirectx12.outputs.status }}

      - name: LIVE URL
        run: |
          echo "================================================"
          echo "  https://fatheratum.github.io/OMNISCREATOR/"
          echo "  BUILD #${{ github.run_number }}"
          echo "================================================"
