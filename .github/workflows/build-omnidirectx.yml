name: Build OMNIDIRECTXINFINITY (DX12)
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build-dx12:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Configure CMake
        run: cmake -B build -S omnidirectxinfinity -G "Visual Studio 17 2022" -A x64
      - name: Build
        run: cmake --build build --config Release --target OMNIDIRECTXINFINITY -j 4
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OMNIDIRECTXINFINITY-Release
          path: build/Release/OMNIDIRECTXINFINITY.exe
