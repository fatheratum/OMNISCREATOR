name: Deploy Godhead Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'godhead-dashboard/**'
      - 'omnibrain-core/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify dashboard files
        run: |
          echo "=== DASHBOARD FILES ==="
          ls -lh godhead-dashboard/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./godhead-dashboard
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "OMNISURF DEPLOY — GODHEAD LIVE"

      - name: Print live URL
        run: |
          echo "================================================"
          echo "  LIVE: https://fatheratum.github.io/OMNISCREATOR/"
          echo "================================================"
